  <text x="528" y="268" font-family="Consolas,monospace" font-size="10" fill="#C9D1D9">  - github</text>
  <text x="528" y="284" font-family="Consolas,monospace" font-size="10" fill="#C9D1D9">  - run_in_terminal</text>
  <text x="516" y="300" font-family="Consolas,monospace" font-size="10" fill="#8B949E">---</text>
  <text x="516" y="320" font-family="Consolas,monospace" font-size="10" fill="#E6EDF3"># Orchestrator Agent</text>
  <text x="516" y="340" font-family="Consolas,monospace" font-size="10" fill="#E6EDF3">## Accountability</text>
  <text x="516" y="356" font-family="Consolas,monospace" font-size="10" fill="#A5D6FF">**Role:** Project Coordinator</text>
  <text x="516" y="372" font-family="Consolas,monospace" font-size="10" fill="#A5D6FF">**Scope:** Project-wide</text>
  <text x="516" y="388" font-family="Consolas,monospace" font-size="10" fill="#A5D6FF">**Delegates to:** Frontend,</text>
  <text x="528" y="404" font-family="Consolas,monospace" font-size="10" fill="#A5D6FF">Backend, Database, QA Agents</text>
  <text x="516" y="424" font-family="Consolas,monospace" font-size="10" fill="#E6EDF3">## Responsibilities</text>
  <text x="516" y="440" font-family="Consolas,monospace" font-size="10" fill="#7EE787">- Break down user requests</text>
  <text x="516" y="456" font-family="Consolas,monospace" font-size="10" fill="#7EE787">- Delegate to specialist agents</text>
  <text x="516" y="472" font-family="Consolas,monospace" font-size="10" fill="#7EE787">- Review &amp; merge results</text>
  <text x="516" y="488" font-family="Consolas,monospace" font-size="10" fill="#7EE787">- Maintain project consistency</text>
  <text x="516" y="504" font-family="Consolas,monospace" font-size="10" fill="#7EE787">- Update Architecture.md</text>
  <text x="516" y="524" font-family="Consolas,monospace" font-size="10" fill="#E6EDF3">## Instructions</text>
  <text x="516" y="540" font-family="Consolas,monospace" font-size="10" fill="#8B949E">You are the project coordinator.</text>
  <text x="516" y="556" font-family="Consolas,monospace" font-size="10" fill="#8B949E">Never implement features directly.</text>
  <text x="516" y="572" font-family="Consolas,monospace" font-size="10" fill="#8B949E">Always delegate to the right</text>
  <text x="516" y="588" font-family="Consolas,monospace" font-size="10" fill="#8B949E">specialist agent. Verify all</text>
  <text x="516" y="604" font-family="Consolas,monospace" font-size="10" fill="#8B949E">changes are consistent with the</text>
  <text x="516" y="620" font-family="Consolas,monospace" font-size="10" fill="#8B949E">architecture before merging.</text>
  <text x="516" y="640" font-family="Consolas,monospace" font-size="10" fill="#E6EDF3">## applyTo</text>
  <text x="516" y="656" font-family="Consolas,monospace" font-size="10" fill="#C9D1D9">  - "**/*"</text>

