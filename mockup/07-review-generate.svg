  <text x="516" y="156" font-family="Consolas,monospace" font-size="10" fill="#8B949E">---</text>
  <text x="516" y="172" font-family="Consolas,monospace" font-size="10" fill="#79C0FF">name<tspan fill="#C9D1D9">: orchestrator</tspan></text>
  <text x="516" y="188" font-family="Consolas,monospace" font-size="10" fill="#79C0FF">description<tspan fill="#C9D1D9">: |</tspan></text>
  <text x="528" y="204" font-family="Consolas,monospace" font-size="10" fill="#A5D6FF">  Project Coordinator. Plans,</text>
  <text x="528" y="220" font-family="Consolas,monospace" font-size="10" fill="#A5D6FF">  delegates and reviews all work.</text>
  <text x="516" y="236" font-family="Consolas,monospace" font-size="10" fill="#79C0FF">tools<tspan fill="#C9D1D9">:</tspan></text>
