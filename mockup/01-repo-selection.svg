<svg width="960" height="640" viewBox="0 0 960 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#13111A"/>
      <stop offset="100%" stop-color="#1E1B30"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5B5EF4"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="heroBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8F9FC"/>
      <stop offset="100%" stop-color="#EEF0FA"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="640" fill="#F0F2F5"/>

  <!-- Header -->
  <rect width="960" height="52" fill="url(#headerGrad)"/>
  <rect x="16" y="13" width="26" height="26" rx="7" fill="#5B5EF4"/>
  <text x="29" y="30" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="800" fill="white" text-anchor="middle">S2</text>
  <text x="50" y="33" font-family="'Segoe UI',Arial,sans-serif" font-size="16" font-weight="700" fill="white" letter-spacing="-0.3">Spec-2-Start</text>

  <!-- Step indicator mini -->
  <rect x="340" y="15" width="280" height="22" rx="11" fill="#ffffff10"/>
  <text x="480" y="30" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#9CA3AF" text-anchor="middle">Schritt 0 von 6  ·  Repo auswaehlen</text>

  <!-- Hero section -->
  <rect x="80" y="72" width="800" height="130" rx="16" fill="url(#heroBg)" stroke="#E2E4E9" stroke-width="1"/>

  <!-- Rocket icon -->
  <circle cx="160" cy="137" r="32" fill="#EEEFFE"/>
  <text x="160" y="146" font-family="'Segoe UI',Arial,sans-serif" font-size="30" text-anchor="middle">&#128640;</text>

  <text x="220" y="118" font-family="'Segoe UI',Arial,sans-serif" font-size="22" font-weight="700" fill="#1C1B2E">Neues Repo einrichten</text>
  <text x="220" y="140" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#6B7280">Dieser Wizard fuehrt dich Schritt fuer Schritt durch die Erstellung</text>
  <text x="220" y="158" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#6B7280">deiner Repo-Standards: Architecture, Docker, Agents &amp; Instructions.</text>

  <!-- Divider -->
  <rect x="80" y="218" width="800" height="1" fill="#E2E4E9"/>

  <!-- Option 1: GitHub Repo -->
  <rect x="80" y="236" width="385" height="240" rx="12" fill="#ffffff" stroke="#E2E4E9" stroke-width="1.5"/>

  <!-- GitHub icon circle -->
  <circle cx="130" cy="276" r="22" fill="#0F1117"/>
  <text x="130" y="283" font-family="'Segoe UI',Arial,sans-serif" font-size="18" fill="white" text-anchor="middle">GH</text>

  <text x="162" y="270" font-family="'Segoe UI',Arial,sans-serif" font-size="16" font-weight="700" fill="#1C1B2E">GitHub Repository</text>
  <text x="162" y="288" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#6B7280">Direkt in ein bestehendes oder neues Repo schreiben</text>

  <!-- Input: Repo URL -->
  <text x="100" y="322" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#374151">Repository URL oder Owner/Name</text>
  <rect x="100" y="330" width="345" height="38" rx="8" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="116" y="353" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#9CA3AF">https://github.com/user/repo-name</text>

  <!-- Branch -->
  <text x="100" y="390" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#374151">Branch</text>
  <rect x="100" y="398" width="160" height="34" rx="7" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="116" y="419" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#374151">main</text>
  <text x="244" y="419" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#9CA3AF">&#9662;</text>

  <!-- Auth status -->
  <rect x="280" y="398" width="165" height="34" rx="7" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
  <circle cx="298" cy="415" r="5" fill="#22C55E"/>
  <text x="310" y="419" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#047857">GitHub verbunden</text>

  <!-- Select button -->
  <rect x="100" y="448" width="345" height="36" rx="8" fill="url(#btnGrad)"/>
  <text x="272" y="470" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="white" text-anchor="middle" font-weight="600">Repository verbinden</text>

  <!-- OR divider -->
  <rect x="479" y="296" width="1" height="120" fill="#E2E4E9"/>
  <rect x="465" y="346" width="30" height="24" rx="12" fill="#F0F2F5"/>
  <text x="480" y="363" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#9CA3AF" text-anchor="middle">OR</text>

  <!-- Option 2: New Repo -->
  <rect x="495" y="236" width="385" height="240" rx="12" fill="#ffffff" stroke="#E2E4E9" stroke-width="1.5"/>

  <circle cx="545" cy="276" r="22" fill="#EEEFFE"/>
  <text x="545" y="284" font-family="'Segoe UI',Arial,sans-serif" font-size="22" fill="#5B5EF4" text-anchor="middle">+</text>

  <text x="577" y="270" font-family="'Segoe UI',Arial,sans-serif" font-size="16" font-weight="700" fill="#1C1B2E">Neues Repo erstellen</text>
  <text x="577" y="288" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#6B7280">Leeres GitHub Repo anlegen und Standards einrichten</text>

  <!-- Repo name -->
  <text x="515" y="322" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#374151">Repository Name</text>
  <rect x="515" y="330" width="345" height="38" rx="8" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="531" y="353" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#9CA3AF">my-awesome-project</text>

  <!-- Visibility -->
  <text x="515" y="390" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#374151">Sichtbarkeit</text>

  <!-- Public option -->
  <rect x="515" y="398" width="100" height="34" rx="7" fill="#EEEFFE" stroke="#5B5EF4" stroke-width="1.5"/>
  <circle cx="533" cy="415" r="6" fill="white" stroke="#5B5EF4" stroke-width="1.5"/>
  <circle cx="533" cy="415" r="3" fill="#5B5EF4"/>
  <text x="545" y="419" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#5B5EF4" font-weight="600">Public</text>

  <!-- Private option -->
  <rect x="625" y="398" width="100" height="34" rx="7" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
  <circle cx="643" cy="415" r="6" fill="white" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="655" y="419" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#6B7280">Private</text>

  <!-- Create button -->
  <rect x="515" y="448" width="345" height="36" rx="8" fill="#ffffff" stroke="#5B5EF4" stroke-width="1.5"/>
  <text x="687" y="470" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#5B5EF4" text-anchor="middle" font-weight="600">Repo erstellen &amp; starten</text>

  <!-- Option 3: Local only -->
  <rect x="80" y="494" width="800" height="58" rx="10" fill="#ffffff" stroke="#E2E4E9" stroke-width="1"/>
  <rect x="100" y="510" width="30" height="26" rx="6" fill="#F3F4F6"/>
  <text x="115" y="528" font-family="'Segoe UI',Arial,sans-serif" font-size="14" text-anchor="middle">&#128193;</text>
  <text x="142" y="522" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="600" fill="#374151">Nur lokal generieren</text>
  <text x="142" y="538" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#9CA3AF">Dateien als ZIP herunterladen, ohne GitHub-Anbindung</text>
  <text x="832" y="528" font-family="'Segoe UI',Arial,sans-serif" font-size="20" fill="#9CA3AF">&#8250;</text>

  <!-- Footer hint -->
  <rect x="80" y="570" width="800" height="42" rx="8" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1"/>
  <rect x="96" y="580" width="4" height="22" rx="2" fill="#F59E0B"/>
  <text x="112" y="594" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#92400E">Tipp: Du kannst jederzeit zwischen den Schritten zuruecknavigieren. Nichts wird geschrieben bis du im letzten Schritt bestaetigt hast.</text>

  <!-- Bottom accent -->
  <rect x="0" y="634" width="960" height="6" fill="url(#btnGrad)"/>
</svg>