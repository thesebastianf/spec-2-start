  <!-- Code content -->
  <text x="104" y="432" font-family="Consolas,monospace" font-size="10" fill="#E6EDF3"># Architecture: team-management-saas</text>
  <text x="104" y="446" font-family="Consolas,monospace" font-size="10" fill="#8B949E"/>
  <text x="104" y="460" font-family="Consolas,monospace" font-size="10" fill="#E6EDF3">## Overview</text>
  <text x="104" y="474" font-family="Consolas,monospace" font-size="10" fill="#8B949E">SaaS platform for team management with task tracking,</text>
  <text x="104" y="488" font-family="Consolas,monospace" font-size="10" fill="#8B949E">dashboards, e-mail notifications and REST API integration.</text>
  <text x="104" y="502" font-family="Consolas,monospace" font-size="10" fill="#8B949E"/>
  <text x="104" y="516" font-family="Consolas,monospace" font-size="10" fill="#E6EDF3">## Tech Stack</text>
  <text x="104" y="530" font-family="Consolas,monospace" font-size="10" fill="#7EE787">| Layer      | Technology          | Purpose              |</text>
  <text x="104" y="544" font-family="Consolas,monospace" font-size="10" fill="#7EE787">|------------|---------------------|----------------------|</text>
  <text x="104" y="558" font-family="Consolas,monospace" font-size="10" fill="#7EE787">| Frontend   | Next.js 14 + React  | SSR + Dashboard UI   |</text>
  <text x="104" y="572" font-family="Consolas,monospace" font-size="10" fill="#7EE787">| Backend    | Node.js + Express   | REST API + Services  |</text>
  <text x="104" y="586" font-family="Consolas,monospace" font-size="10" fill="#7EE787">| Database   | PostgreSQL 16       | Primary datastore    |</text>

