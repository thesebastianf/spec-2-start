  <rect x="580" y="102" width="175" height="2" fill="#5B5EF4"/>
  <text x="596" y="92" font-family="Consolas,monospace" font-size="10" fill="#E6EDF3">copilot-instructions.md</text>
  <text x="768" y="92" font-family="Consolas,monospace" font-size="10" fill="#6B7280">AGENTS.md</text>

  <!-- Code content -->
  <text x="596" y="126" font-family="Consolas,monospace" font-size="10" fill="#E6EDF3"># Copilot Instructions</text>
  <text x="596" y="144" font-family="Consolas,monospace" font-size="10" fill="#8B949E"/>
  <text x="596" y="160" font-family="Consolas,monospace" font-size="10" fill="#E6EDF3">## Project</text>
  <text x="596" y="176" font-family="Consolas,monospace" font-size="10" fill="#8B949E">team-management-saas</text>
  <text x="596" y="192" font-family="Consolas,monospace" font-size="10" fill="#8B949E">TypeScript / Node.js</text>
  <text x="596" y="212" font-family="Consolas,monospace" font-size="10" fill="#E6EDF3">## Instructions</text>
  <text x="596" y="232" font-family="Consolas,monospace" font-size="10" fill="#E6EDF3">### Prompt Dokumentation</text>
  <text x="596" y="248" font-family="Consolas,monospace" font-size="10" fill="#7EE787">Every executed prompt MUST be</text>
  <text x="596" y="264" font-family="Consolas,monospace" font-size="10" fill="#7EE787">logged in executed-prompts.md</text>
  <text x="596" y="280" font-family="Consolas,monospace" font-size="10" fill="#7EE787">with a timestamp.</text>
  <text x="596" y="300" font-family="Consolas,monospace" font-size="10" fill="#E6EDF3">### Documentation</text>
  <text x="596" y="316" font-family="Consolas,monospace" font-size="10" fill="#7EE787">README.md and Architecture.md</text>
  <text x="596" y="332" font-family="Consolas,monospace" font-size="10" fill="#7EE787">MUST be kept up-to-date with</text>
  <text x="596" y="348" font-family="Consolas,monospace" font-size="10" fill="#7EE787">every relevant change.</text>
  <text x="596" y="368" font-family="Consolas,monospace" font-size="10" fill="#E6EDF3">### SVG Mockups</text>
  <text x="596" y="384" font-family="Consolas,monospace" font-size="10" fill="#7EE787">Create SVG mockups for all</text>
  <text x="596" y="400" font-family="Consolas,monospace" font-size="10" fill="#7EE787">UI pages BEFORE starting</text>
  <text x="596" y="416" font-family="Consolas,monospace" font-size="10" fill="#7EE787">implementation.</text>
  <text x="596" y="436" font-family="Consolas,monospace" font-size="10" fill="#E6EDF3">### Git Conventions</text>
  <text x="596" y="452" font-family="Consolas,monospace" font-size="10" fill="#7EE787">Use Conventional Commits:</text>
  <text x="596" y="468" font-family="Consolas,monospace" font-size="10" fill="#7EE787">feat:, fix:, docs:, chore:</text>
  <text x="596" y="484" font-family="Consolas,monospace" font-size="10" fill="#7EE787">Always include scope, e.g.</text>
  <text x="596" y="500" font-family="Consolas,monospace" font-size="10" fill="#A5D6FF">feat(api): add user endpoint</text>

  <text x="596" y="524" font-family="Consolas,monospace" font-size="10" fill="#E6EDF3">## Docker &amp; Env Standard</text>
  <text x="596" y="540" font-family="Consolas,monospace" font-size="10" fill="#8B949E">See standards/docker/ for</text>
  <text x="596" y="556" font-family="Consolas,monospace" font-size="10" fill="#8B949E">the complete docker &amp; env</text>
  <text x="596" y="572" font-family="Consolas,monospace" font-size="10" fill="#8B949E">setup instructions...</text>

