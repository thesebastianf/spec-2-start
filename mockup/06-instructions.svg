  <text x="120" y="244" font-family="'Segoe UI',Arial,sans-serif" font-size="12" font-weight="700" fill="#1C1B2E">Docs immer aktuell</text>
  <rect x="252" y="232" width="52" height="18" rx="4" fill="#DCFCE7"/>
  <text x="278" y="245" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#166534" text-anchor="middle">default</text>
  <text x="120" y="264" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#6B7280">README.md und Architecture.md muessen bei jeder</text>
  <text x="120" y="278" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#6B7280">relevanten Aenderung aktualisiert werden.</text>
  <rect x="482" y="234" width="36" height="24" rx="5" fill="#DCFCE7"/>
  <text x="500" y="250" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#166534" text-anchor="middle">AN</text>

