  <rect x="64" y="308" width="472" height="76" rx="9" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1.5"/>
  <rect x="80" y="320" width="6" height="52" rx="3" fill="#22C55E"/>
  <circle cx="102" cy="326" r="10" fill="#22C55E"/>
  <text x="102" y="330" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="white" text-anchor="middle">&#10003;</text>
  <text x="120" y="330" font-family="'Segoe UI',Arial,sans-serif" font-size="12" font-weight="700" fill="#1C1B2E">SVG Mockups erstellen</text>
  <rect x="274" y="318" width="52" height="18" rx="4" fill="#DCFCE7"/>
  <text x="300" y="331" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#166534" text-anchor="middle">default</text>
  <text x="120" y="350" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#6B7280">Fuer alle UI-Seiten SVG Mockups erstellen bevor</text>
  <text x="120" y="364" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#6B7280">die Implementierung beginnt.</text>
  <rect x="482" y="320" width="36" height="24" rx="5" fill="#DCFCE7"/>
  <text x="500" y="336" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#166534" text-anchor="middle">AN</text>

  <!-- Custom instruction (user added) -->
  <rect x="64" y="396" width="472" height="76" rx="9" fill="#EEEFFE" stroke="#C7C9FE" stroke-width="1.5"/>
  <rect x="80" y="408" width="6" height="52" rx="3" fill="#5B5EF4"/>
  <circle cx="102" cy="414" r="10" fill="#5B5EF4"/>
  <text x="102" y="418" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="white" text-anchor="middle">&#10003;</text>
  <text x="120" y="418" font-family="'Segoe UI',Arial,sans-serif" font-size="12" font-weight="700" fill="#1C1B2E">Git Commit Konventionen</text>
  <rect x="286" y="406" width="50" height="18" rx="4" fill="#EEEFFE"/>
  <text x="311" y="419" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#5B5EF4" text-anchor="middle">custom</text>
  <text x="120" y="438" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#6B7280">Conventional Commits verwenden: feat:, fix:, docs:, chore:</text>
  <text x="120" y="452" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#6B7280">Immer mit Scope z.B. feat(api): add user endpoint</text>
  <rect x="482" y="408" width="36" height="24" rx="5" fill="#EEEFFE"/>
  <text x="500" y="424" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#5B5EF4" text-anchor="middle">AN</text>

